services:
  affiny_db:
    image: postgres:15.15-bookworm

    container_name: affiny_db

    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    
    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

  affiny_frontend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: affiny_frontend

    restart: always

    ports:
      - "3000:3000"
    
    env_file:
      - .env

    depends_on:
      affiny_db:
        condition: service_healthy
    
    develop:
      watch:
        - action: sync
          path: .
          target: /app/
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json

volumes:
  postgres_data:
